<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">  
  <link rel="stylesheet" href="login.css">
  <title>Document</title>
</head>
<body>

  <h1 id="message1">Welcome Back .!</h1>
  <h2 id="message2"><i>CineFlix-------</i></h2>
 <div class="logOrReg">
    <div class="loginDiv" id="loginDiv">
      <h3>Login</h3>
      <h5>Glad You're Back..!</h5>
      <div class="inputs">
        <input id="UsernameLogin" type="text" placeholder="UserName" >
        <input id="PasswordLogin" type="password" placeholder="Password">
        <br>
        <input type="button" value="Login" name="" id="">
      </div>
      

      <p>Don't have an account? <a id="signuplink" href="#">Signup</a></p>
    </div>

    <div id="signupDiv">
      <h3>SignUp</h3>
      <h5>New Here..?</h5>
      <div class="inputs">
        <input id="UsernameReg" type="text" placeholder="UserName" >
        <input id="PasswordReg" type="password" placeholder="Password">
        <input id="ConfirmPasswordReg" type="password" placeholder="Confirm Password">
        <br>
        <input type="button" value="Login" name="" id="">
      </div>
      <p>Already have an account? <a id="loginlink" href="#">Login</a></p>
    </div>
 </div>
 
 <script>
  document.getElementById('signuplink').addEventListener('click',function(){
    document.getElementById('loginDiv').style.display='none';
    document.getElementById('signupDiv').style.display='block';

    document.getElementById('message1').innerHTML='Registration'
    document.getElementById('message2').innerHTML=''
    document.getElementById('message2').style.border='none';
  });
  document.getElementById('loginlink').addEventListener('click',function(){
    document.getElementById('loginDiv').style.display='block';
    document.getElementById('signupDiv').style.display='none';

    document.getElementById('message1').innerHTML='Welcome Back .!'
    document.getElementById('message2').innerHTML='CineFlix-------'
    document.getElementById('message2').style.borderStyle = "solid"; 
    document.getElementById('message2').style.borderColor = "white";

  })
 </script>

  
</body>
</html>
